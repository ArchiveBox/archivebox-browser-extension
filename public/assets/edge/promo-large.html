<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ArchiveBox large promotional tile</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #32271d;
        background: #f7f0e6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 1400px;
        height: 560px;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 16% 16%, rgba(23, 118, 166, 0.22), transparent 34%),
          linear-gradient(135deg, #fbf4ea 0%, #eadbc9 50%, #cfdfe4 100%);
      }

      main {
        display: grid;
        grid-template-columns: 440px 1fr;
        gap: 44px;
        width: 100%;
        height: 100%;
        padding: 54px 62px;
      }

      .copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .logo {
        width: 86px;
        height: 86px;
        margin-bottom: 24px;
        border-radius: 20px;
        box-shadow: 0 16px 38px rgba(62, 45, 28, 0.18);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 58px;
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        max-width: 410px;
        margin: 0;
        color: #6a5947;
        font-size: 24px;
        line-height: 1.3;
      }

      .screens {
        position: relative;
        min-width: 0;
      }

      .screen {
        position: absolute;
        overflow: hidden;
        border: 1px solid rgba(87, 68, 44, 0.2);
        border-radius: 12px;
        background: #fffaf2;
        box-shadow: 0 24px 60px rgba(48, 35, 22, 0.22);
      }

      .screen img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .screen.main {
        top: 0;
        right: 0;
        width: 760px;
        height: 475px;
      }

      .screen.popup {
        right: 570px;
        bottom: 0;
        width: 300px;
        height: 340px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="copy">
        <img class="logo" src="./archivebox-logo-300.png" alt="">
        <h1>ArchiveBox</h1>
        <p>Preserve copies of websites using your ArchiveBox server while you browse.</p>
      </section>
      <section class="screens" aria-hidden="true">
        <div class="screen main">
          <img src="./saved-urls-1280x800.png" alt="">
        </div>
        <div class="screen popup">
          <img src="./popup-ui-1280x800.png" alt="">
        </div>
      </section>
    </main>
  </body>
</html>
